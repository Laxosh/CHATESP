<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Chat Hub</title>
    <script src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <style>
        :root {
            --whatsapp-green: #075e54;
            --whatsapp-light: #dcf8c6;
            --bg-color: #e5ddd5;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        .header { background: var(--whatsapp-green); color: white; padding: 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .header h2 { margin: 0; font-size: 18px; flex-grow: 1; margin-left: 10px; }

        /* Chat Area */
        #chat-container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 8px 12px; border-radius: 8px; font-size: 14px; position: relative; word-wrap: break-word; }
        .received { background: white; align-self: flex-start; border-bottom-left-radius: 0; }
        .sent { background: var(--whatsapp-light); align-self: flex-end; border-bottom-right-radius: 0; }
        .meta { font-size: 10px; color: #888; margin-top: 4px; text-align: right; }

        /* Input Area */
        .input-area { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; }
        input { flex-grow: 1; border: none; padding: 12px; border-radius: 25px; outline: none; }
        button { background: var(--whatsapp-green); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header">
        <ion-icon name="person-circle-outline" style="font-size: 40px;"></ion-icon>
        <h2>ESP32 Mediator Chat</h2>
        <div id="status" style="font-size: 12px;">Connecting...</div>
    </div>

    <div id="chat-container">
        <!-- Messages appear here -->
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message">
        <button onclick="sendMessage()"><ion-icon name="send" style="font-size: 20px;"></ion-icon></button>
    </div>

    <script>
        // CHANGE THIS to your ESP32 IP address (usually 192.168.4.1 if in AP mode)
        const gateway = `ws://192.168.4.1/ws`;
        let websocket;

        function initWebSocket() {
            console.log('Trying to open a WebSocket connection...');
            websocket = new WebSocket(gateway);
            websocket.onopen = () => document.getElementById('status').innerText = 'Online';
            websocket.onclose = () => {
                document.getElementById('status').innerText = 'Offline - Retrying...';
                setTimeout(initWebSocket, 2000);
            };
            websocket.onmessage = (event) => {
                appendMessage(event.data, 'received');
            };
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (input.value !== "") {
                websocket.send(input.value);
                appendMessage(input.value, 'sent');
                input.value = "";
            }
        }

        function appendMessage(text, type) {
            const container = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `${text} <div class="meta">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        window.onload = initWebSocket;
    </script>
</body>
</html>
