<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Private Chat Hub</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: #1a1a1e;
            --accent-color: #0078d4;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: var(--panel-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d34;
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background-color: #0063b1; }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 250px;
            background-color: var(--panel-bg);
            border-right: 1px solid #2d2d34;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }
        .user-list {
            list-style: none;
            padding: 0;
            margin: 10px 0;
            overflow-y: auto;
            flex: 1;
        }
        .user-item {
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 5px;
            border: 1px solid transparent;
        }
        .user-item:hover { background-color: #2d2d34; }
        .user-item.selected {
            background-color: rgba(0, 120, 212, 0.2);
            border-color: var(--accent-color);
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #141416;
        }
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.4;
        }
        .msg.system { background-color: #2d2d34; color: var(--text-muted); align-self: center; font-size: 0.9rem; }
        .msg.incoming { background-color: #26262b; align-self: flex-start; }
        .msg.outgoing { background-color: var(--accent-color); align-self: flex-end; }
        .input-bar {
            padding: 20px;
            background-color: var(--panel-bg);
            display: flex;
            gap: 10px;
            border-top: 1px solid #2d2d34;
        }
        input[type="text"] {
            flex: 1;
            background-color: #26262b;
            border: 1px solid #2d2d34;
            color: white;
            padding: 12px;
            border-radius: 4px;
            outline: none;
        }
    </style>
</head>
<body>

    <header>
        <h2>🔒 ESP32 Secure Mesh Terminal</h2>
        <div class="connection-status">
            <input type="text" id="usernameInput" placeholder="Enter Username..." style="max-width: 150px; padding: 6px;">
            <button id="connectBtn" onclick="initSerialConnection()">🔌 Connect to ESP32</button>
        </div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <h3>Active Channels</h3>
            <div id="targetLabel" style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px;">Target: Broadcasting All</div>
            <ul class="user-list" id="activeUsers">
                <li class="user-item selected" onclick="selectChatTarget('GLOBAL_BROADCAST', this)">🌐 Global Room</li>
            </ul>
        </div>

        <div class="chat-area">
            <div class="messages-container" id="chatBox">
                <div class="msg system">System offline. Please connect via USB serial port link.</div>
            </div>
            <div class="input-bar">
                <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)" disabled>
                <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        let port;
        let writer;
        let reader;
        let myUsername = "";
        let selectedTarget = "GLOBAL_BROADCAST";
        let partialDataBuffer = "";

        async function initSerialConnection() {
            const userIn = document.getElementById("usernameInput").value.trim();
            if(!userIn) { alert("Please enter a handle identity first."); return; }
            myUsername = userIn;

            try {
                // Request Hardware COM Port from user permissions
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                
                writer = port.writable.getWriter();
                document.getElementById("connectBtn").innerText = "🟩 Linked";
                document.getElementById("messageInput").disabled = false;
                document.getElementById("sendBtn").disabled = false;
                
                appendSystemMsg("USB Serial pipeline attached. Syncing profile wrapper...");

                // Transmit registration wrapper to hardware router
                const regPayload = { type: "register", sender: myUsername };
                await sendToHardware(regPayload);

                // Initialize background intake listening thread
                readSerialStream();
            } catch (err) {
                appendSystemMsg("Connection failure: " + err);
            }
        }

        async function sendToHardware(jsonObject) {
            if (!writer) return;
            const payloadStr = JSON.stringify(jsonObject) + "\n"; // Explicit delimiter for standard text read loops
            const encoder = new TextEncoder();
            await writer.write(encoder.encode(payloadStr));
        }

        async function readSerialStream() {
            const decoder = new TextDecoder();
            while (port.readable) {
                reader = port.readable.getReader();
                try {
                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        
                        partialDataBuffer += decoder.decode(value, { stream: true });
                        let boundaryIndex;
                        
                        // Parse complete lines split by the newline token matching micro-controller loop filters
                        while ((boundaryIndex = partialDataBuffer.indexOf('\n')) >= 0) {
                            const absoluteLine = partialDataBuffer.substring(0, boundaryIndex).trim();
                            partialDataBuffer = partialDataBuffer.substring(boundaryIndex + 1);
                            if (absoluteLine.length > 0) {
                                processIncomingData(absoluteLine);
                            }
                        }
                    }
                } catch (err) {
                    console.error("Stream reader encountered structural error:", err);
                } finally {
                    reader.releaseLock();
                }
            }
        }

        function processIncomingData(rawString) {
            try {
                const packet = JSON.parse(rawString);
                
                if (packet.type === "system_userlist") {
                    updateRosterUI(packet.data || []);
                } 
                else if (packet.type === "private_chat") {
                    appendMessage(packet.sender, packet.text, "incoming");
                }
            } catch(e) {
                // Skips raw system serial logs printed out by hardware startup boot logs
                console.log("Filtered non-JSON payload noise:", rawString);
            }
        }

        function updateRosterUI(userArray) {
            const listContainer = document.getElementById("activeUsers");
            listContainer.innerHTML = `<li class="user-item ${selectedTarget === 'GLOBAL_BROADCAST' ? 'selected' : ''}" onclick="selectChatTarget('GLOBAL_BROADCAST', this)">🌐 Global Room</li>`;
            
            userArray.forEach(username => {
                if(username === myUsername) return; // Hide self from targeting map
                const isSelected = selectedTarget === username ? 'selected' : '';
                listContainer.innerHTML += `<li class="user-item ${isSelected}" onclick="selectChatTarget('${username}', this)">👤 ${username}</li>`;
            });
        }

        function selectChatTarget(target, element) {
            selectedTarget = target;
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById("targetLabel").innerText = `Target: ${target === 'GLOBAL_BROADCAST' ? 'Broadcasting All' : 'Encrypted Direct to ' + target}`;
        }

        async function sendMessage() {
            const msgInput = document.getElementById("messageInput");
            const txt = msgInput.value.trim();
            if(!txt) return;

            if(selectedTarget === "GLOBAL_BROADCAST") {
                appendSystemMsg("Direct network configuration active. Please select a specific user profile node to trace messaging paths.");
                msgInput.value = "";
                return;
            }

            const chatPayload = {
                type: "private_msg",
                sender: myUsername,
                target: selectedTarget,
                text: txt
            };

            await sendToHardware(chatPayload);
            appendMessage(`To [${selectedTarget}]`, txt, "outgoing");
            msgInput.value = "";
        }

        function appendMessage(sender, text, type) {
            const box = document.getElementById("chatBox");
            box.innerHTML += `<div class="msg ${type}"><strong>${sender}:</strong> ${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function appendSystemMsg(text) {
            const box = document.getElementById("chatBox");
            box.innerHTML += `<div class="msg system">${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function handleKeyPress(e) { if(e.key === 'Enter') sendMessage(); }
    </script>
</body>
</html>
